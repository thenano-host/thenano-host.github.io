<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 • Nano Host</title>
  <style>
    :root{--bg:#fff;--text:#0f172a;--muted:#64748b;--accent:#7c3aed}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;padding:20px}
    .box{max-width:500px}
    h1{font-size:4rem;font-weight:900;margin:0 0 10px;background:linear-gradient(45deg,var(--accent),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{color:var(--muted);margin-bottom:25px;font-size:1.1rem}
    a{color:var(--accent);text-decoration:none;font-weight:700}
    a:hover{text-decoration:underline}
    .btn{display:inline-block;background:var(--accent);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:700;margin-top:10px;transition:.2s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,58,237,.3)}
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Hoppla! Diese Seite existiert nicht – aber dein Minecraft Server wartet schon! 😄</p>
    <a href="/" class="btn">← Zurück zu Nano Host</a>
  </div>
</body>
</html>
